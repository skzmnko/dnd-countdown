<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ораска ждет...</title>
    <style>
        /* ========== Глобальные стили ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            
            /* ===== ФОН ===== */
            /* Картинка из папки проекта — замените название файла */
            background-image: url('timer-background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Тёмная подложка для читаемости текста */
            background-color: rgba(10, 10, 10, 0.55);
            background-blend-mode: overlay;
            
            padding: 20px;
        }

        /* ========== Центральный блок ========== */
        .hero {
            text-align: center;
            max-width: 800px;
            width: 100%;
            
            /* Лёгкая дымка для контраста */
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 40px 30px 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s ease;
        }

        .hero:hover {
            transform: scale(1.01);
        }

        /* ========== Заголовок ========== */
        .hero-title {
            font-size: clamp(1.87rem, 6.67vw, 3.67rem);
            font-weight: 700;
            color: #ffffff;
            text-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(0, 0, 0, 0.5);
            letter-spacing: 4px;
            margin-bottom: 20px;
            line-height: 1.2;
            word-break: break-word;
        }

        .hero-title span {
            display: inline-block;
            animation: fadeGlow 3s ease-in-out infinite alternate;
        }

        @keyframes fadeGlow {
            0% { text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 215, 100, 0.1); }
            100% { text-shadow: 0 4px 30px rgba(0, 0, 0, 0.9), 0 0 60px rgba(255, 215, 100, 0.3); }
        }

        /* ========== Таймер ========== */
        .timer-grid {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .time-block {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 14px 12px 10px;
            min-width: 80px;
            flex: 1 0 70px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.6), 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }

        .time-block:hover {
            border-color: rgba(255, 215, 100, 0.3);
            box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 215, 100, 0.08);
        }

        .time-number {
            display: block;
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            font-weight: 700;
            color: #ffffff;
            line-height: 1.1;
            text-shadow: 0 0 30px rgba(255, 215, 100, 0.2);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }

        .time-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2.5px;
            margin-top: 4px;
            font-weight: 400;
        }

        .separator {
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(2.4rem, 6vw, 3.6rem);
            font-weight: 200;
            align-self: center;
            padding: 0 2px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* ========== Сообщение о старте ========== */
        .launch-message {
            margin-top: 25px;
            font-size: clamp(1.6rem, 5vw, 3rem);
            font-weight: 700;
            color: #ffd966;
            text-shadow: 0 0 40px rgba(255, 215, 100, 0.4), 0 4px 20px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 100, 0.15);
            letter-spacing: 2px;
            display: none;
        }

        /* ========== Адаптивность ========== */
        @media (max-width: 550px) {
            .hero {
                padding: 30px 18px 35px;
                border-radius: 28px;
            }
            .time-block {
                min-width: 60px;
                padding: 10px 6px;
            }
            .separator {
                padding: 0 1px;
            }
        }

        @media (max-width: 400px) {
            .timer-grid {
                gap: 6px;
            }
            .time-block {
                flex: 1 0 50px;
                min-width: 45px;
                padding: 8px 4px;
                border-radius: 12px;
            }
            .time-number {
                font-size: 2rem;
            }
            .time-label {
                font-size: 0.6rem;
                letter-spacing: 1.5px;
            }
            .separator {
                font-size: 1.4rem;
            }
            .hero {
                padding: 20px 12px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="hero">
        <!-- Заголовок -->
        <h1 class="hero-title">
            <span>Next session in...</span>
        </h1>

        <!-- Таймер -->
        <div class="timer-grid" id="timerContainer">
            <div class="time-block">
                <span class="time-number" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="time-number" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="time-number" id="minutes">00</span>
                <span class="time-label">Minutes</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="time-number" id="seconds">00</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>

        <!-- Сообщение, когда таймер достигнет нуля -->
        <div id="launchMessage" class="launch-message">
            It's time to play!
        </div>
    </div>

    <script>
        (function() {
            // =============================================
            // 1. НАСТРОЙКА ДАТЫ СТАРТА
            //    (год, месяц (0-11), день, час, минута)
            // =============================================
            const targetDate = new Date(2026, 6, 11, 16, 0, 0).getTime();

            // Элементы таймера
            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const launchMsg = document.getElementById('launchMessage');
            const timerContainer = document.getElementById('timerContainer');

            // =============================================
            // 2. ФУНКЦИЯ ОБНОВЛЕНИЯ ТАЙМЕРА
            // =============================================
            function updateTimer() {
                const now = Date.now();
                let diff = targetDate - now;

                // Если таймер достиг нуля или ушёл в прошлое
                if (diff <= 0) {
                    daysEl.textContent = '00';
                    hoursEl.textContent = '00';
                    minutesEl.textContent = '00';
                    secondsEl.textContent = '00';
                    launchMsg.style.display = 'block';
                    timerContainer.style.opacity = '0.4';
                    return;
                }

                // Если сообщение было видно, скрываем его (таймер ещё идёт)
                if (launchMsg.style.display === 'block') {
                    launchMsg.style.display = 'none';
                    timerContainer.style.opacity = '1';
                }

                // Вычисление дней, часов, минут, секунд
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                diff -= days * (1000 * 60 * 60 * 24);
                const hours = Math.floor(diff / (1000 * 60 * 60));
                diff -= hours * (1000 * 60 * 60);
                const minutes = Math.floor(diff / (1000 * 60));
                diff -= minutes * (1000 * 60);
                const seconds = Math.floor(diff / 1000);

                // Форматирование с ведущим нулём
                daysEl.textContent = String(days).padStart(2, '0');
                hoursEl.textContent = String(hours).padStart(2, '0');
                minutesEl.textContent = String(minutes).padStart(2, '0');
                secondsEl.textContent = String(seconds).padStart(2, '0');
            }

            // Обновляем таймер сразу и запускаем интервал
            updateTimer();
            setInterval(updateTimer, 1000);

            console.log('⏳ Таймер запущен! Дата старта: ' + new Date(targetDate).toLocaleString());
        })();
    </script>

</body>
</html>
