<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oraska is waiting...</title>
    <style>
        /* ========== Global styles ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            
            /* ===== Background ===== */
            background-image: url('timer-background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(10, 10, 10, 0.55);
            background-blend-mode: overlay;
            padding: 20px;
        }

        /* ========== Central block ========== */
        .hero {
            text-align: center;
            max-width: 800px;
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 40px 30px 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s ease;
        }

        .hero:hover {
            transform: scale(1.01);
        }

        /* ========== Title (dynamic) ========== */
        .hero-title {
            font-size: clamp(1.87rem, 6.67vw, 3.67rem);
            font-weight: 700;
            color: #ffffff;
            text-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(0, 0, 0, 0.5);
            letter-spacing: 4px;
            margin-bottom: 20px;
            line-height: 1.2;
            word-break: break-word;
            transition: text-shadow 0.3s;
        }

        .hero-title span {
            display: inline-block;
            animation: fadeGlow 3s ease-in-out infinite alternate;
        }

        @keyframes fadeGlow {
            0% { text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 215, 100, 0.1); }
            100% { text-shadow: 0 4px 30px rgba(0, 0, 0, 0.9), 0 0 60px rgba(255, 215, 100, 0.3); }
        }

        /* ========== Timer ========== */
        .timer-grid {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .time-block {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 14px 12px 10px;
            min-width: 80px;
            flex: 1 0 70px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.6), 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }

        .time-block:hover {
            border-color: rgba(255, 215, 100, 0.3);
            box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 215, 100, 0.08);
        }

        .time-number {
            display: block;
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            font-weight: 700;
            color: #ffffff;
            line-height: 1.1;
            text-shadow: 0 0 30px rgba(255, 215, 100, 0.2);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }

        .time-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2.5px;
            margin-top: 4px;
            font-weight: 400;
        }

        .separator {
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(2.4rem, 6vw, 3.6rem);
            font-weight: 200;
            align-self: center;
            padding: 0 2px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* ========== Launch message (hidden, managed via title) ========== */
        .launch-message {
            display: none;
        }

        /* ========== Responsive ========== */
        @media (max-width: 550px) {
            .hero {
                padding: 30px 18px 35px;
                border-radius: 28px;
            }
            .time-block {
                min-width: 60px;
                padding: 10px 6px;
            }
            .separator {
                padding: 0 1px;
            }
        }

        @media (max-width: 400px) {
            .timer-grid {
                gap: 6px;
            }
            .time-block {
                flex: 1 0 50px;
                min-width: 45px;
                padding: 8px 4px;
                border-radius: 12px;
            }
            .time-number {
                font-size: 2rem;
            }
            .time-label {
                font-size: 0.6rem;
                letter-spacing: 1.5px;
            }
            .separator {
                font-size: 1.4rem;
            }
            .hero {
                padding: 20px 12px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="hero">
        <!-- TITLE: dynamically changed via JS -->
        <h1 class="hero-title" id="dynamicTitle">
            <span>Next session in...</span>
        </h1>

        <!-- Timer -->
        <div class="timer-grid" id="timerContainer">
            <div class="time-block">
                <span class="time-number" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="time-number" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="time-number" id="minutes">00</span>
                <span class="time-label">Minutes</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="time-number" id="seconds">00</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>

        <!-- hidden element for compatibility (not used) -->
        <div id="launchMessage" class="launch-message"></div>
    </div>

    <script>
        (function() {
            // ============================================================
            // 1. SESSION START DATE: July 18, 2026, 16:00
            // ============================================================
            const targetDate = new Date(2026, 6, 18, 16, 0, 0).getTime();

            // Timer elements and title
            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const titleEl = document.getElementById('dynamicTitle');

            // ============================================================
            // 2. HELPER FUNCTIONS FOR DATE HANDLING
            // ============================================================
            
            // Returns an object with { days, hours, minutes, seconds }
            function getTimeComponents(diffMs) {
                if (diffMs < 0) diffMs = 0;
                let diff = diffMs;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                diff -= days * (1000 * 60 * 60 * 24);
                const hours = Math.floor(diff / (1000 * 60 * 60));
                diff -= hours * (1000 * 60 * 60);
                const minutes = Math.floor(diff / (1000 * 60));
                diff -= minutes * (1000 * 60);
                const seconds = Math.floor(diff / 1000);
                return { days, hours, minutes, seconds };
            }

            // Formats a number with leading zero (2 digits)
            function pad(n) {
                return String(n).padStart(2, '0');
            }

            // Checks if the current moment is on the session day (local time)
            // and the timer has already expired (diff <= 0) — then show "Session is over"
            // The session day lasts from 00:00 to 23:59:59 local time.
            function isSessionDayOver(diff, now) {
                if (diff > 0) return false; // still time before start

                // Session date (without time)
                const sessionDate = new Date(targetDate);
                sessionDate.setHours(0, 0, 0, 0); // start of session day

                const nowDate = new Date(now);
                nowDate.setHours(0, 0, 0, 0); // start of current day

                // If current day matches session day, and diff <= 0 means we passed start time
                // but still within the session day (until midnight) — show "Session is over"
                if (nowDate.getTime() === sessionDate.getTime()) {
                    return true;
                }
                return false;
            }

            // ============================================================
            // 3. MAIN UPDATE FUNCTION: TIMER + TITLE
            // ============================================================
            function updateTimerAndTitle() {
                const now = Date.now();
                let diff = targetDate - now;

                // ---- 3a. Update timer digits ----
                // If diff < 0, show 00:00:00:00
                const comp = getTimeComponents(diff);
                daysEl.textContent = pad(comp.days);
                hoursEl.textContent = pad(comp.hours);
                minutesEl.textContent = pad(comp.minutes);
                secondsEl.textContent = pad(comp.seconds);

                // ---- 3b. Title logic ----
                // Cases:
                // 1) diff > 0  -> "Next session in..."
                // 2) diff <= 0 && isSessionDayOver(...) == true -> "Session is over"
                // 3) diff <= 0 && isSessionDayOver(...) == false -> "It's time to play!"

                let titleText = '';

                if (diff > 0) {
                    // Still time before the session
                    titleText = 'Next session in...';
                } else {
                    // Session start time has passed (diff <= 0)
                    if (isSessionDayOver(diff, now)) {
                        // Still on session day (after start, before midnight)
                        titleText = 'Session is over';
                    } else {
                        // After session day (next day or later)
                        titleText = 'It\'s time to play!';
                    }
                }

                // Update title content (keep <span> for animation)
                const span = titleEl.querySelector('span');
                if (span) {
                    span.textContent = titleText;
                } else {
                    // fallback
                    titleEl.innerHTML = `<span>${titleText}</span>`;
                }

                // Visual tweak: "Session is over" gets a warmer color
                if (titleText === 'Session is over') {
                    titleEl.style.color = '#ffaa66';
                    titleEl.style.textShadow = '0 0 30px rgba(255, 150, 50, 0.5), 0 4px 20px rgba(0,0,0,0.8)';
                } else {
                    titleEl.style.color = '#ffffff';
                    titleEl.style.textShadow = '0 4px 20px rgba(0, 0, 0, 0.8), 0 0 60px rgba(0, 0, 0, 0.5)';
                }
            }

            // ============================================================
            // 4. START THE TIMER
            // ============================================================
            updateTimerAndTitle();
            setInterval(updateTimerAndTitle, 1000);

            console.log('⏳ Timer started! Session date: ' + new Date(targetDate).toLocaleString());
        })();
    </script>

</body>
</html>
